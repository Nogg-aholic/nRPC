name: Publish nRPC

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  detect-version-bump:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect package version bump
        id: detect
        shell: bash
        run: |
          node <<'EOF' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const { execSync } = require('node:child_process');

          const filePath = 'package.json';
          const beforeSha = process.env.GITHUB_EVENT_BEFORE;
          const currentVersion = JSON.parse(fs.readFileSync(filePath, 'utf8')).version;

          let previousVersion = null;
          if (beforeSha && !/^0+$/.test(beforeSha)) {
            try {
              previousVersion = JSON.parse(execSync(`git show ${beforeSha}:${filePath}`, {
                stdio: ['ignore', 'pipe', 'ignore'],
              }).toString('utf8')).version;
            } catch {
              previousVersion = null;
            }
          }

          const changed = previousVersion === null || previousVersion !== currentVersion;
          console.log(`changed=${changed ? 'true' : 'false'}`);
          console.log(`version=${currentVersion}`);
          EOF

  publish:
    needs: detect-version-bump
    if: needs.detect-version-bump.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Pack release tarball
        run: npm pack

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-version-bump.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: nRPC v${{ needs.detect-version-bump.outputs.version }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          append_body: false
          generate_release_notes: true
          files: |
            nogg-aholic-nrpc-${{ needs.detect-version-bump.outputs.version }}.tgz
