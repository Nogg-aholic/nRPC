name: Publish nRPC

on:
  push:
    branches:
      - main
    paths:
      - package.json
      - src/**
      - README.md
      - tsconfig.json
      - .github/workflows/publish.yml
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read package version
        id: pkg
        shell: bash
        run: echo "version=$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Remove npm auth token from user config
        shell: bash
        run: |
          set -euo pipefail
          if [ -f "$NPM_CONFIG_USERCONFIG" ]; then
            python - <<'PY'
from pathlib import Path
import os

path = Path(os.environ['NPM_CONFIG_USERCONFIG'])
lines = path.read_text(encoding='utf-8').splitlines()
filtered = [line for line in lines if '_authToken=' not in line]
path.write_text('\n'.join(filtered) + ('\n' if filtered else ''), encoding='utf-8')
PY
          fi

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Pack release tarball
        run: npm pack

      - name: Verify npm package access
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if npm view "$PACKAGE_NAME" name --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "Package exists on npm: $PACKAGE_NAME"
          else
            echo "npm does not currently expose $PACKAGE_NAME for publish/view from this account/scope."
            echo "For trusted publishing, ensure the npm scope/package exists and the trusted publisher is attached to this exact package."
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ""
        run: npm publish --provenance --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.pkg.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: nRPC v${{ steps.pkg.outputs.version }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          append_body: false
          generate_release_notes: true
          files: |
            nogg-aholic-nrpc-${{ steps.pkg.outputs.version }}.tgz
